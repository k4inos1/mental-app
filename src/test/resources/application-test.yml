spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: false
  sql:
    init:
      mode: never
  jwt:
    secret: test-secret-key-for-unit-tests-only-1234567890
    expiration: 86400000
